name: Release

# Tag a commit `vX.Y.Z` and push it to publish a release with module.json +
# module.zip attached, matching the install/download URLs in module.json
# (releases/latest/download/…).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into module.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const m = JSON.parse(fs.readFileSync("module.json", "utf8"));
          m.version = process.env.VERSION;
          fs.writeFileSync("module.json", JSON.stringify(m, null, 2) + "\n");
          EOF

      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Pull the `## [VERSION]` section up to (not including) the next `## [`.
          awk -v v="## [$VERSION]" '
            index($0, v)==1 {f=1; next}
            /^## \[/ {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Fail loudly rather than shipping an empty-body release.
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG.md section found for $VERSION"
            exit 1
          fi

      - name: Build module.zip
        run: |
          zip -r module.zip \
            module.json \
            README.md LICENSE CHANGELOG.md CREDITS.md \
            assets icons languages scripts styles templates docs \
            -x "scripts/**/*.test.mjs"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            module.json
            module.zip
